<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NHL Legacy — WASM</title>
  <style>
    body { margin: 0; background: #111; color: #0f0; font: 14px monospace; }
    #log { padding: 10px; white-space: pre-wrap; height: 95vh; overflow-y: auto; }
    .err { color: #f44; }
    .warn { color: #fa0; }
    .info { color: #0af; }
    #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
               background:#222; border:1px solid #0f0; padding:20px; border-radius:8px;
               text-align:center; font-size:16px; }
    #progress-bar { width:300px; height:6px; background:#333; margin:10px auto; }
    #progress-bar div { height:100%; background:#0f0; width:0; transition:width .3s; }
  </style>
</head>
<body>
  <div id="loading">
    <div>🏒 NHL Legacy — WASM</div>
    <div id="load-status">Initializing...</div>
    <div id="progress-bar"><div id="progress"></div></div>
  </div>
  <div id="log"></div>

  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('load-status');
    const progressEl = document.getElementById('progress');
    const loadingEl = document.getElementById('loading');

    function log(msg, cls) {
      logEl.innerHTML += `<span class="${cls||''}">${msg}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    console.error = function(...a) { log(a.join(' '), 'err'); };
    console.warn  = function(...a) { log(a.join(' '), 'warn'); };
    console.log   = function(...a) { log(a.join(' '), 'info'); };

    var Module = {
      print:    msg => log(msg),
      printErr: msg => log(msg, 'err'),
      onAbort:  msg => { log('ABORT: ' + msg, 'err'); loadingEl.style.display='none'; },
      setStatus: function(text) {
        statusEl.textContent = text;
        if (text) log(text, 'info');
      },
      onRuntimeInitialized: function() {
        log('WASM runtime initialized', 'info');
        loadingEl.style.display = 'none';
      },
      canvas: (() => {
        const c = document.createElement('canvas');
        c.width = 1280; c.height = 720; c.id = 'canvas';
        document.body.appendChild(c);
        return c;
      })(),
      // Monitor data downloads
      monitorRunDependencies: function(left) {
        statusEl.textContent = left > 0
          ? `Loading data files... (${left} remaining)`
          : 'Running...';
      }
    };

    // Track .wasm download progress
    const origFetch = window.fetch;
    window.fetch = function(url, opts) {
      if (typeof url === 'string' && url.endsWith('.wasm')) {
        return origFetch(url, opts).then(response => {
          const total = +response.headers.get('Content-Length') || 213*1024*1024;
          const reader = response.body.getReader();
          let loaded = 0;
          const stream = new ReadableStream({
            start(controller) {
              function pump() {
                reader.read().then(({done, value}) => {
                  if (done) { controller.close(); return; }
                  loaded += value.length;
                  const pct = Math.round(loaded / total * 100);
                  statusEl.textContent = `Downloading WASM... ${pct}%`;
                  progressEl.style.width = pct + '%';
                  controller.enqueue(value);
                  pump();
                });
              }
              pump();
            }
          });
          return new Response(stream, { headers: response.headers });
        });
      }
      return origFetch(url, opts);
    };

    statusEl.textContent = 'Fetching nhllegacy.wasm (213 MB)...';
  </script>
  <script src="nhllegacy.js"></script>
</body>
</html>
